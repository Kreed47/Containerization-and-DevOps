<!DOCTYPE html>
<html>

<head>
<title>User Manager</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:90%;
padding:8px;
margin-bottom:10px;
}

button{
padding:8px 12px;
background:#3498db;
color:white;
border:none;
}

table{
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>User Manager</h2>

<input id="name" placeholder="Enter name">

<button onclick="addUser()">Add User</button>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

async function loadUsers(){

let res = await fetch("/users")
let data = await res.json()

let table=document.getElementById("table")
table.innerHTML=""

data.forEach(u=>{
table.innerHTML+=`<tr><td>${u[0]}</td><td>${u[1]}</td></tr>`
})

}

async function addUser(){

let name=document.getElementById("name").value

await fetch("/users?name="+name,{method:"POST"})

loadUsers()

}

loadUsers()

</script>

</body>
</html>
